<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Materias - Amor y Libertad</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- SWEETALERT2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .card { padding: 30px; border-radius: 20px; background: #ffffff; border: 1px solid #e0e6ed; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-back-clean { display: inline-flex; align-items: center; gap: 5px; margin-bottom: 15px; color: #666; text-decoration: none; font-weight: bold; }
        .input-control { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header class="profile-header">
    <div class="cover-photo"><img src="Img/logo2.png" alt="Portada"></div>
    <div class="profile-info">
        <a href="dashboard-maestro.html" class="btn-back-clean">⬅ Volver al Panel</a>
        <div class="profile-text">
            <h1>Mis Materias</h1>
            <p>Tus asignaturas por grupo</p>
        </div>
    </div>
</header>

<main class="grid-layout">
    <section class="card">
        <h3 style="margin-top:0; color:#004a99;">📚 Nueva Materia</h3>
        <label>Nombre de la Materia</label>
        <input type="text" id="nombreMateria" class="input-control" placeholder="Ej: Matemáticas">
        
        <label>Asignar al Grupo</label>
        <select id="grupoMateria" class="input-control">
            <option value="">Cargando grupos oficiales...</option>
        </select>
        
        <button id="btn-registrar-materia" class="btn btn-primary" style="width:100%; padding:12px; border-radius:8px; cursor:pointer;">Guardar Materia</button>
    </section>

    <section class="card">
        <h3 style="margin-top:0; color:#004a99;">📋 Mis Materias Registradas</h3>
        <table>
            <thead><tr><th>Materia</th><th>Grupo</th><th>Acción</th></tr></thead>
            <tbody id="lista-materias"></tbody>
        </table>
    </section>
</main>

<script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { collection, addDoc, getDocs, doc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let maestroActual = null;

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "login.html";
        else {
            maestroActual = localStorage.getItem('supliendo_a') || user.email;
            cargarGruposOficiales();
            cargarMisMaterias();
        }
    });

    async function cargarGruposOficiales() {
        const selectGrupo = document.getElementById('grupoMateria');
        try {
            const querySnapshot = await getDocs(collection(db, "grupos"));
            selectGrupo.innerHTML = '<option value="">Selecciona un grupo...</option>';
            querySnapshot.forEach((docSnap) => {
                selectGrupo.innerHTML += `<option value="${docSnap.data().nombre}">${docSnap.data().nombre}</option>`;
            });
        } catch (error) { selectGrupo.innerHTML = '<option value="">Error al cargar grupos</option>'; }
    }

    document.getElementById('btn-registrar-materia').addEventListener('click', async () => {
        const nombre = document.getElementById('nombreMateria').value;
        const grupo = document.getElementById('grupoMateria').value;
        
        if (!nombre || !grupo) {
            Swal.fire('Faltan datos', 'Completa ambos campos para continuar.', 'warning');
            return;
        }

        try {
            await addDoc(collection(db, "materias"), { nombre, grupo, maestro_email: maestroActual });
            
            Swal.fire({
                title: '¡Materia registrada!',
                text: 'La asignatura fue vinculada a tu cuenta.',
                icon: 'success',
                confirmButtonColor: '#004a99'
            }).then(() => {
                location.reload();
            });

        } catch (error) { 
            Swal.fire('Error', 'Ocurrió un error al guardar.', 'error');
        }
    });

    async function cargarMisMaterias() {
        const lista = document.getElementById('lista-materias');
        try {
            const q = query(collection(db, "materias"), where("maestro_email", "==", maestroActual));
            const querySnapshot = await getDocs(q);
            lista.innerHTML = "";
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-weight:bold;">${data.nombre}</td>
                    <td><span style="background:#eef2f7; padding:4px 8px; border-radius:4px;">${data.grupo}</span></td>
                    <td><button class="btn-delete">Borrar</button></td>
                `;
                
                // BORRADO CON ALERTA PROFESIONAL
                row.querySelector('.btn-delete').addEventListener('click', () => {
                    Swal.fire({
                        title: '¿Eliminar materia?',
                        text: "Esta acción no se puede deshacer.",
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#ff4d4d',
                        cancelButtonColor: '#666',
                        confirmButtonText: 'Sí, borrar',
                        cancelButtonText: 'Cancelar'
                    }).then(async (result) => {
                        if (result.isConfirmed) {
                            await deleteDoc(doc(db, "materias", docSnap.id));
                            location.reload();
                        }
                    });
                });

                lista.appendChild(row);
            });
        } catch (error) {}
    }
</script>
</body>
</html>
