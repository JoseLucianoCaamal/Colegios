<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Pública - Amor y Libertad</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" href="Img/logo.png">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7fa; margin: 0; padding: 0; color: #333;}
        
        .hero-banner { background: #004a99; color: white; padding: 40px 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px;}
        .hero-banner h1 { margin: 0; font-size: 2.2rem; letter-spacing: 1px;}
        .hero-banner p { margin: 10px 0 0 0; font-size: 1.1rem; opacity: 0.9;}
        
        .container { max-width: 1000px; margin: auto; padding: 0 20px 40px 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 30px; border: 1px solid #eef2f7;}
        
        .input-control { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 1.1rem; color: #333; outline: none; transition: 0.3s; cursor: pointer; box-sizing: border-box;}
        .input-control:focus { border-color: #004a99; }
        label { font-size: 0.9rem; font-weight: bold; color: #666; display: block; margin-bottom: 8px; text-transform: uppercase;}
        
        /* CUADRÍCULA COMPACTA (2 FOTOS POR FILA EN CELULAR) */
        .photo-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        .photo-item { position: relative; border-radius: 10px; overflow: hidden; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: transform 0.3s; display: flex; flex-direction: column;}
        .photo-item:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15);}
        .photo-item img { width: 100%; height: 150px; object-fit: cover; display: block; border-bottom: 3px solid #FF9800;}
        
        .info { padding: 10px; font-size: 0.8rem; background: #ffffff; text-align: center; font-weight: bold; color: #004a99; flex-grow: 1; display: flex; flex-direction: column; justify-content: center;}
        .tag-seccion { display: block; font-size: 0.7rem; color: #8898aa; margin-top: 4px; font-weight: normal; }
        
        /* BOTÓN DE DESCARGA (FLOTANTE) */
        .btn-descarga { position: absolute; bottom: 65px; right: 8px; background: rgba(0, 74, 153, 0.9); color: white; text-decoration: none; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.3); transition: 0.3s; z-index: 10;}
        .btn-descarga:hover { background: #FF9800; transform: scale(1.1); }
        
        .btn-volver { display: inline-block; margin-top: 20px; background: rgba(255,255,255,0.2); color: white; padding: 8px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; transition: 0.3s;}
        .btn-volver:hover { background: rgba(255,255,255,0.4); }
        .loader-text { text-align: center; color: #666; font-size: 1.1rem; padding: 40px 0; font-weight: bold;}
    </style>
</head>
<body>

    <header class="hero-banner">
        <h1>📸 Galería Escolar</h1>
        <p>Revive los mejores momentos de nuestros alumnos</p>
        <a href="index.html" class="btn-volver">⬅ Volver al Inicio</a>
    </header>

    <div class="container">
        <section class="card">
            <label>Filtrar por Álbum o Evento</label>
            <select id="filtroSeccion" class="input-control">
                <option value="TODAS">Cargando fotografías...</option>
            </select>
        </section>

        <div id="galeria" class="photo-gallery">
            <div class="loader-text" style="grid-column: 1 / -1;">Descargando recuerdos... ⏳</div>
        </div>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const filtroSeccion = document.getElementById('filtroSeccion');
        const galeria = document.getElementById('galeria');

        async function inicializarGaleria() {
            try {
                const snap = await getDocs(collection(db, "fotos"));
                const seccionesUnicas = new Set();
                
                snap.forEach(doc => {
                    if (doc.data().seccion) seccionesUnicas.add(doc.data().seccion);
                });

                filtroSeccion.innerHTML = '<option value="TODAS">Ver Todas las Fotografías</option>';
                seccionesUnicas.forEach(seccion => {
                    filtroSeccion.innerHTML += `<option value="${seccion}">${seccion}</option>`;
                });

                if (seccionesUnicas.size === 0) {
                    filtroSeccion.innerHTML = '<option value="TODAS">Aún no hay fotos subidas.</option>';
                }

                cargarFotos("TODAS");

            } catch (error) {
                console.error("Error al cargar la galería:", error);
                filtroSeccion.innerHTML = '<option value="TODAS">Error de conexión.</option>';
                galeria.innerHTML = '<div class="loader-text" style="grid-column: 1 / -1; color: #c62828;">Ocurrió un error al cargar. Inténtalo de nuevo.</div>';
            }
        }
        
        async function cargarFotos(seccionElegida) {
            galeria.innerHTML = '<div class="loader-text" style="grid-column: 1 / -1;">Descargando recuerdos... ⏳</div>';
            
            try {
                let qFotos = (seccionElegida === "TODAS") 
                    ? query(collection(db, "fotos")) 
                    : query(collection(db, "fotos"), where("seccion", "==", seccionElegida));

                const snap = await getDocs(qFotos);
                galeria.innerHTML = "";
                let contador = 0;

                snap.forEach(doc => {
                    contador++;
                    const data = doc.data();
                    
                    let fechaTexto = "Reciente";
                    if (data.fecha && data.fecha.toDate) {
                        fechaTexto = data.fecha.toDate().toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
                    }

                    // TRUCO CLOUDINARY PARA FORZAR DESCARGA
                    const urlDescarga = data.url.replace('/upload/', '/upload/fl_attachment/');

                    galeria.innerHTML += `
                        <div class="photo-item">
                            <a href="${urlDescarga}" class="btn-descarga" title="Descargar Foto">⬇️</a>
                            <a href="${data.url}" target="_blank" title="Haz clic para ver en grande">
                                <img src="${data.url}" loading="lazy" alt="Recuerdo escolar">
                            </a>
                            <div class="info">
                                ${fechaTexto}
                                <span class="tag-seccion">${data.seccion}</span>
                            </div>
                        </div>
                    `;
                });

                if (contador === 0) {
                    galeria.innerHTML = '<div class="loader-text" style="grid-column: 1 / -1;">No encontramos fotos en este álbum.</div>';
                }

            } catch (error) {
                galeria.innerHTML = '<div class="loader-text" style="grid-column: 1 / -1; color: #c62828;">Ocurrió un error al cargar las fotos.</div>';
            }
        }

        filtroSeccion.addEventListener('change', () => cargarFotos(filtroSeccion.value));
        inicializarGaleria();
    </script>
</body>
</html>
