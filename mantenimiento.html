<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mantenimiento - Amor y Libertad</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- LIBRERÍA SWEETALERT2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Img/logo.png">
    <style>
        .container { max-width: 700px; margin: 50px auto; padding: 0 20px; }
        .card { padding: 40px; border-radius: 20px; background: #ffffff; border: 1px solid #eef2f7; box-shadow: 0 8px 16px rgba(0,0,0,0.05); text-align: center;}
        .btn-back-clean { display: inline-flex; align-items: center; gap: 5px; color: #666; text-decoration: none; font-weight: bold; margin-bottom: 20px; }
        .btn-danger { background: #c62828; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; width: 100%; transition: 0.3s; margin-bottom: 15px;}
        .btn-danger:hover { background: #b71c1c; transform: scale(1.02);}
        .alert-box { background: #ffebee; border: 1px solid #ffcdd2; color: #c62828; padding: 15px; border-radius: 8px; margin-bottom: 30px; text-align: left; font-size: 0.95rem; line-height: 1.5;}
    </style>
</head>
<body>

<main class="container">
    <a href="dashboard-directora.html" class="btn-back-clean">⬅ Volver al Panel</a>
    
    <section class="card">
        <span style="font-size: 4rem; display:block; margin-bottom:10px;">⚠️</span>
        <h2 style="color:#c62828; margin-top:0;">Limpieza General del Sistema</h2>
        
        <div class="alert-box">
            <strong>¡Atención Directora!</strong><br>
            Estas herramientas están diseñadas para ejecutarse al finalizar el ciclo escolar. Borrarán permanentemente los datos de la base de datos. <b>Esta acción no se puede deshacer.</b>
        </div>
        
        <button id="btn-limpiar-calif" class="btn-danger">🗑️ Borrar Todas las Calificaciones</button>
        <hr style="border: 1px solid #eee; margin: 30px 0;">
        <button id="btn-limpiar-fichas" class="btn-danger" style="background:#e65100;">🗑️ Borrar Todas las Fichas Descriptivas</button>
    </section>
</main>

<script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "login.html";
    });

    // Función unificada y profesional con SweetAlert
    async function ejecutarMantenimiento(coleccionData, nombreVisible) {
        const { value: confirmacion } = await Swal.fire({
            title: 'Seguridad del Sistema',
            html: `Para borrar <b>${nombreVisible}</b>, escribe la palabra:<br><br><b style="color:red; font-size:1.2rem;">CONFIRMAR</b>`,
            input: 'text',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#c62828',
            cancelButtonColor: '#666',
            confirmButtonText: 'Sí, borrar datos',
            cancelButtonText: 'Cancelar',
            inputValidator: (value) => {
                if (value !== 'CONFIRMAR') {
                    return 'Debes escribir CONFIRMAR en mayúsculas.';
                }
            }
        });

        if (confirmacion === 'CONFIRMAR') {
            Swal.fire({
                title: 'Borrando datos...',
                text: 'Por favor no cierres esta ventana.',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const querySnapshot = await getDocs(collection(db, coleccionData));
                for (let i = 0; i < querySnapshot.docs.length; i++) {
                    await deleteDoc(doc(db, coleccionData, querySnapshot.docs[i].id));
                }
                Swal.fire('¡Sistema Limpio!', `Se han borrado ${nombreVisible} exitosamente.`, 'success');
            } catch (error) {
                Swal.fire('Error', 'Hubo un problema de conexión al borrar los datos.', 'error');
            }
        }
    }

    document.getElementById('btn-limpiar-calif').addEventListener('click', () => {
        ejecutarMantenimiento("calificaciones", "TODAS las calificaciones");
    });

    document.getElementById('btn-limpiar-fichas').addEventListener('click', () => {
        ejecutarMantenimiento("fichas", "TODAS las fichas descriptivas");
    });
</script>
</body>
</html>
