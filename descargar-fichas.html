<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Fichas - Amor y Libertad</title>
    <link rel="icon" type="image/png" href="Img/logo.png">
    <link rel="stylesheet" href="css/styles.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .card { padding: 30px; border-radius: 20px; background: #ffffff; border: 1px solid #eef2f7; box-shadow: 0 8px 16px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .input-control { width: 100%; padding: 12px 15px; border: 2px solid #eef2f7; border-radius: 10px; font-size: 1rem; outline: none; margin-bottom: 20px;}
        label { font-size: 0.85rem; font-weight: bold; color: #8898aa; display: block; margin-bottom: 8px; text-transform: uppercase;}
        
        .tabla-contenedor { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.95rem; min-width: 600px;}
        th { padding: 15px; text-align: left; border-bottom: 2px solid #eef2f7; color: #004a99; text-transform: uppercase; font-size: 0.85rem;}
        td { padding: 15px; text-align: left; border-bottom: 1px solid #f4f7fa; }
        .btn-back-clean { display: inline-flex; align-items: center; gap: 5px; color: #666; text-decoration: none; font-weight: bold; margin-bottom: 15px; }
        
        /* ESTILOS PARA LA PLANTILLA DEL PDF */
        #plantilla-pdf { display: none; width: 800px; background: white; padding: 40px; color: #333; font-family: 'Arial', sans-serif; box-sizing: border-box;}
        .pdf-header { text-align: center; border-bottom: 3px solid #004a99; padding-bottom: 20px; margin-bottom: 30px; }
        .pdf-header img { width: 120px; margin-bottom: 10px; }
        .pdf-header h1 { color: #004a99; font-size: 24px; margin: 0; }
        .pdf-header h2 { color: #555; font-size: 18px; margin: 5px 0 0 0; font-weight: normal; }
        .pdf-info-box { background: #f8fafd; padding: 20px; border-radius: 10px; border: 1px solid #e0e6ed; margin-bottom: 30px; }
        .pdf-info-box p { margin: 8px 0; font-size: 14px; font-weight: bold; color:#004a99;}
        .pdf-info-box span { font-weight: normal; color:#333;}
        .pdf-body { line-height: 1.8; font-size: 14px; text-align: justify; white-space: pre-wrap; }
    </style>
</head>
<body>

<header class="profile-header">
    <div class="cover-photo"><img src="Img/logo2.png" alt="Portada"></div>
    <div class="profile-info">
        <a href="dashboard-directora.html" class="btn-back-clean">⬅ Volver al Panel</a>
        <div class="profile-text">
            <h1>Gestión de Fichas Descriptivas</h1>
            <p>Control y Exportación Oficial de Documentos</p>
        </div>
    </div>
</header>

<main class="container">
    <section class="card">
        <label>🏫 Selecciona un Grupo para ver sus Fichas</label>
        <select id="filtroGrupo" class="input-control">
            <option value="">Cargando grupos...</option>
        </select>
        <button id="btn-buscar" class="btn btn-primary" style="width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; background:#004a99; border:none; cursor:pointer;">Buscar Fichas</button>
    </section>

    <section class="card" id="seccion-resultados" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
            <h3 style="color:#004a99; margin:0;">📋 Fichas Encontradas</h3>
            
            <div style="display: flex; gap: 10px; flex-wrap: wrap;" id="botones-accion-global">
                <button id="btn-borrar-todo" class="btn" style="background:#ff4d4d; color:white; font-weight:bold; border:none; padding:10px 15px; border-radius:8px; cursor:pointer;">
                    🗑️ Borrar Todas
                </button>
                <button id="btn-descargar-zip" class="btn" style="background:#FF9800; color:#333; font-weight:bold; border:none; padding:10px 15px; border-radius:8px; cursor:pointer;">
                    🗂️ Descargar ZIP
                </button>
            </div>
        </div>
        
        <p id="estado-zip" style="color:#4CAF50; font-weight:bold; text-align:right; display:none;"></p>

        <div class="tabla-contenedor">
            <table>
                <thead>
                    <tr>
                        <th>Alumno</th>
                        <th>Docente Evaluador</th>
                        <th>Fecha</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-fichas">
                    <!-- Se llena con JS -->
                </tbody>
            </table>
        </div>
    </section>
</main>

<div id="plantilla-pdf">
    <div class="pdf-header">
        <img src="Img/logo.png" alt="Logo">
        <h1>Centro Educativo Amor y Libertad</h1>
        <h2>Documento Oficial: Ficha Descriptiva</h2>
    </div>
    <div class="pdf-info-box">
        <p>ALUMNO: <span id="pdf-nombre"></span></p>
        <p>GRUPO: <span id="pdf-grupo"></span></p>
        <!-- AHORA USAMOS EL NOMBRE REAL -->
        <p>DOCENTE EVALUADOR: <span id="pdf-maestro"></span></p>
    </div>
    <div class="pdf-body" id="pdf-texto"></div>
</div>

<script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { collection, query, where, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let fichasActuales = []; 
    
    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "login.html";
        else cargarGrupos();
    });

    async function cargarGrupos() {
        const snap = await getDocs(collection(db, "grupos"));
        const filtroGrupo = document.getElementById('filtroGrupo');
        filtroGrupo.innerHTML = '<option value="">Seleccione grupo...</option>';
        snap.forEach(doc => filtroGrupo.innerHTML += `<option value="${doc.data().nombre}">${doc.data().nombre}</option>`);
    }

    document.getElementById('btn-buscar').addEventListener('click', async () => {
        const grupo = document.getElementById('filtroGrupo').value;
        if (!grupo) return Swal.fire('Aviso', 'Selecciona un grupo.', 'warning');
        
        document.getElementById('seccion-resultados').style.display = 'block';
        const tabla = document.getElementById('tabla-fichas');
        tabla.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Buscando fichas... 🔍</td></tr>";

        try {
            const qFichas = query(collection(db, "fichas"), where("grupo", "==", grupo));
            const querySnapshot = await getDocs(qFichas);
            
            fichasActuales = [];
            tabla.innerHTML = "";
            let contador = 0;

            querySnapshot.forEach((docSnap) => {
                contador++;
                const data = docSnap.data();
                data.id = docSnap.id; 
                fichasActuales.push(data); 

                // Si el maestro antiguo no tenía nombre guardado, usamos su correo como respaldo
                const nombreDelProfesor = data.maestro_nombre || data.maestro_email.split('@')[0];

                const row = document.createElement('tr');
                let fechaFormato = "Reciente";
                if(data.ultima_actualizacion) {
                    fechaFormato = data.ultima_actualizacion.toDate().toLocaleDateString('es-MX');
                }

                row.innerHTML = `
                    <td style="font-weight:bold;">${data.nombre_alumno}</td>
                    <td style="color:#666;">${nombreDelProfesor}</td>
                    <td>${fechaFormato}</td>
                    <td style="text-align: center;">
                        <button class="btn-ver-pdf" style="background:#004a99; color:white; border:none; padding:6px 12px; border-radius:5px; cursor:pointer; font-weight:bold; margin:2px;">📄 PDF</button>
                        <button class="btn-delete" style="background:#ff4d4d; color:white; border:none; padding:6px 12px; border-radius:5px; cursor:pointer; font-weight:bold; margin:2px;">🗑️</button>
                    </td>
                `;

                row.querySelector('.btn-ver-pdf').addEventListener('click', () => {
                    generarPDFIndividual(data, nombreDelProfesor);
                });

                row.querySelector('.btn-delete').addEventListener('click', () => {
                    Swal.fire({
                        title: '¿Eliminar Ficha?',
                        text: `Borrando ficha de ${data.nombre_alumno}`,
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#ff4d4d',
                        confirmButtonText: 'Sí, borrar'
                    }).then(async (result) => {
                        if (result.isConfirmed) {
                            await deleteDoc(doc(db, "fichas", data.id));
                            document.getElementById('btn-buscar').click(); 
                        }
                    });
                });

                tabla.appendChild(row);
            });

            const botonesAccion = document.getElementById('botones-accion-global');
            if(contador === 0) {
                tabla.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#ff4d4d;'>No hay fichas creadas para este grupo aún.</td></tr>";
                botonesAccion.style.display = 'none';
            } else {
                botonesAccion.style.display = 'flex';
            }

        } catch (error) {
            tabla.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Error al cargar los datos.</td></tr>";
        }
    });

    document.getElementById('btn-borrar-todo').addEventListener('click', async () => {
        const grupo = document.getElementById('filtroGrupo').value;
        
        const { value: confirmacion } = await Swal.fire({
            title: 'Borrado Masivo',
            text: `Escribe CONFIRMAR para eliminar todas las fichas de ${grupo}`,
            input: 'text',
            icon: 'error',
            showCancelButton: true,
            confirmButtonText: 'Eliminar Todo',
            confirmButtonColor: '#ff4d4d'
        });

        if (confirmacion === "CONFIRMAR") {
            Swal.fire({ title: 'Borrando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                for (let i = 0; i < fichasActuales.length; i++) {
                    await deleteDoc(doc(db, "fichas", fichasActuales[i].id));
                }
                Swal.fire('¡Eliminado!', 'Todas las fichas han sido borradas.', 'success');
                document.getElementById('btn-buscar').click(); 
            } catch (error) {
                Swal.fire('Error', 'Ocurrió un problema.', 'error');
            }
        }
    });

    function generarPDFIndividual(data, nombreDelProfesor) {
        document.getElementById('pdf-nombre').innerText = data.nombre_alumno;
        document.getElementById('pdf-grupo').innerText = data.grupo;
        document.getElementById('pdf-maestro').innerText = nombreDelProfesor;
        document.getElementById('pdf-texto').innerText = data.texto;

        const plantilla = document.getElementById('plantilla-pdf');
        plantilla.style.display = 'block';
        
        html2pdf().set({
            margin: 15,
            filename: `${data.nombre_alumno} ${data.grupo}.pdf`, 
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'letter', orientation: 'portrait' }
        }).from(plantilla).save().then(() => {
            plantilla.style.display = 'none';
        });
    }

    document.getElementById('btn-descargar-zip').addEventListener('click', async () => {
        const grupo = document.getElementById('filtroGrupo').value;
        const btnZip = document.getElementById('btn-descargar-zip');
        
        btnZip.disabled = true;
        Swal.fire({ title: 'Generando Archivos', text: 'Esto puede tardar unos segundos...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const zip = new JSZip();
        const carpeta = zip.folder(`Fichas_PDF_${grupo.replace(/\s+/g, '_')}`);
        const plantilla = document.getElementById('plantilla-pdf');

        const opcionesPDF = {
            margin: 15, image: { type: 'jpeg', quality: 1 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'letter', orientation: 'portrait' }
        };

        try {
            plantilla.style.display = 'block';

            for (let i = 0; i < fichasActuales.length; i++) {
                const data = fichasActuales[i];
                const nombreDelProfesor = data.maestro_nombre || data.maestro_email.split('@')[0];
                
                document.getElementById('pdf-nombre').innerText = data.nombre_alumno;
                document.getElementById('pdf-grupo').innerText = data.grupo;
                document.getElementById('pdf-maestro').innerText = nombreDelProfesor;
                document.getElementById('pdf-texto').innerText = data.texto;

                const pdfBlob = await html2pdf().set(opcionesPDF).from(plantilla).output('blob');
                carpeta.file(`${data.nombre_alumno} ${data.grupo}.pdf`, pdfBlob);
            }

            const contenidoZip = await zip.generateAsync({type:"blob"});
            saveAs(contenidoZip, `Fichas_Completas_${grupo.replace(/\s+/g, '_')}.zip`);
            
            Swal.fire('¡Listo!', 'El archivo ZIP se ha descargado.', 'success');
            btnZip.disabled = false;

        } catch (error) {
            Swal.fire('Error', 'Hubo un fallo al crear los PDFs.', 'error');
            btnZip.disabled = false;
        } finally {
            plantilla.style.display = 'none';
        }
    });
</script>
</body>
</html>
