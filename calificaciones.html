<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calificaciones - Amor y Libertad</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- SWEETALERT2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .card { padding: 30px; border-radius: 20px; background: #ffffff; border: 1px solid #eef2f7; box-shadow: 0 8px 16px rgba(0,0,0,0.03); margin-bottom: 25px; }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; align-items: end; }
        .input-control { width: 100%; padding: 12px; border: 2px solid #eef2f7; border-radius: 8px; font-size: 1rem; outline:none; transition:0.3s;}
        .input-control:focus {border-color: #004a99;}
        label { font-size: 0.85rem; font-weight: bold; color: #8898aa; display: block; margin-bottom: 5px; text-transform: uppercase;}
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .input-calificacion { width: 100%; max-width: 150px; padding: 10px; font-weight: bold; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem;}
        .btn-back-clean { display: inline-flex; align-items: center; gap: 5px; color: #666; text-decoration: none; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<header class="profile-header">
    <div class="cover-photo"><img src="Img/logo2.png" alt="Portada"></div>
    <div class="profile-info">
        <a href="documentos-maestro.html" class="btn-back-clean">⬅ Volver a Documentos</a>
        <div class="profile-text">
            <h1>Registro de Calificaciones</h1>
            <p>Evaluación de alumnos por periodo</p>
        </div>
    </div>
</header>

<main class="container">
    <section class="card">
        <div class="filters-grid">
            <div>
                <label>Grupo</label>
                <select id="filtroGrupo" class="input-control"><option value="">Cargando...</option></select>
            </div>
            <div>
                <label>Asignatura</label>
                <select id="materiaAsistencia" class="input-control"><option value="">Esperando grupo...</option></select>
            </div>
            <div>
                <label>Trimestre / Periodo</label>
                <select id="periodoEvaluacion" class="input-control">
                    <option value="Trimestre 1">Trimestre 1</option>
                    <option value="Trimestre 2">Trimestre 2</option>
                    <option value="Trimestre 3">Trimestre 3</option>
                </select>
            </div>
            <div>
                <button id="btn-cargar-lista" class="btn btn-primary" style="width:100%; padding:12px; border-radius:8px; background:#4CAF50; border:none; font-weight:bold; cursor:pointer;">Evaluar Alumnos</button>
            </div>
        </div>
    </section>

    <section class="card" id="seccion-lista" style="display: none;">
        <h3 style="margin-top: 0; color: #4CAF50;" id="titulo-lista">Alumnos a Evaluar</h3>
        <table>
            <thead><tr><th>Nombre del Alumno</th><th>Calificación / Observación</th></tr></thead>
            <tbody id="tabla-calificaciones"></tbody>
        </table>
        <button id="btn-guardar" class="btn btn-primary" style="width:100%; margin-top:20px; padding:15px; border-radius:8px; font-weight:bold; background:#004a99; border:none; cursor:pointer;">✅ Guardar Calificaciones</button>
    </section>
</main>

<script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { collection, query, where, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const filtroGrupo = document.getElementById('filtroGrupo');
    const selectMateria = document.getElementById('materiaAsistencia');
    const tabla = document.getElementById('tabla-calificaciones');
    let maestroActual = null;
    let alumnosActuales = [];

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "login.html";
        else { maestroActual = user.email; cargarGrupos(); }
    });

    async function cargarGrupos() {
        const snap = await getDocs(collection(db, "grupos"));
        filtroGrupo.innerHTML = '<option value="">Seleccione grupo...</option>';
        snap.forEach(doc => filtroGrupo.innerHTML += `<option value="${doc.data().nombre}">${doc.data().nombre}</option>`);
    }

    filtroGrupo.addEventListener('change', async () => {
        const grupoSel = filtroGrupo.value;
        selectMateria.innerHTML = "<option value=''>Cargando tus materias...</option>";
        if (!grupoSel) return;
        
        const qMaterias = query(collection(db, "materias"), where("maestro_email", "==", maestroActual));
        const querySnapshot = await getDocs(qMaterias);
        selectMateria.innerHTML = "<option value=''>Seleccione asignatura...</option>";
        let cont = 0;
        querySnapshot.forEach((docSnap) => {
            if(docSnap.data().grupo === grupoSel) {
                cont++; selectMateria.innerHTML += `<option value="${docSnap.data().nombre}">${docSnap.data().nombre}</option>`;
            }
        });
        if (cont === 0) selectMateria.innerHTML = "<option value=''>No tienes materias aquí</option>";
    });

    document.getElementById('btn-cargar-lista').addEventListener('click', async () => {
        const grupo = filtroGrupo.value; const materia = selectMateria.value; const periodo = document.getElementById('periodoEvaluacion').value;
        
        if(!grupo || !materia) {
            Swal.fire('Cuidado', 'Selecciona el grupo y la asignatura.', 'warning');
            return;
        }
        
        document.getElementById('seccion-lista').style.display = 'block'; 
        alumnosActuales = [];
        document.getElementById('titulo-lista').innerText = `Evaluando ${materia} - ${periodo}`;

        try {
            const idDocumento = `${grupo}_${materia}_${periodo}`.replace(/\s+/g, '');
            const docCalificaciones = await getDocs(query(collection(db, "calificaciones"), where("id_unico", "==", idDocumento)));
            let notasGuardadas = {};
            if(!docCalificaciones.empty) notasGuardadas = docCalificaciones.docs[0].data().notas;

            const qAlumnos = query(collection(db, "alumnos"), where("grupo", "==", grupo));
            const alumnosSnap = await getDocs(qAlumnos);
            tabla.innerHTML = ""; let cont = 0;
            
            alumnosSnap.forEach((docSnap) => {
                cont++; const data = docSnap.data(); const idAlumno = docSnap.id;
                alumnosActuales.push(idAlumno);
                let notaPrevia = notasGuardadas[idAlumno] || "";

                tabla.innerHTML += `
                    <tr>
                        <td style="font-weight:bold; font-size:1.05rem;">${data.nombre}</td>
                        <td><input type="text" class="input-calificacion" id="calif_${idAlumno}" value="${notaPrevia}" placeholder="Ej: 10, B, Excelente..."></td>
                    </tr>
                `;
            });
            if(cont === 0) tabla.innerHTML = "<tr><td colspan='2'>No hay alumnos en este grupo.</td></tr>";
        } catch (e) { console.error(e); }
    });

    document.getElementById('btn-guardar').addEventListener('click', async () => {
        if(alumnosActuales.length === 0) return;
        const grupo = filtroGrupo.value; const materia = selectMateria.value; const periodo = document.getElementById('periodoEvaluacion').value;
        const idDocumento = `${grupo}_${materia}_${periodo}`.replace(/\s+/g, '');
        
        let notas = {};
        alumnosActuales.forEach(id => { notas[id] = document.getElementById(`calif_${id}`).value; });

        try {
            await setDoc(doc(db, "calificaciones", idDocumento), { 
                id_unico: idDocumento, grupo, materia, periodo, maestro_email: maestroActual, notas 
            });
            
            // MENSAJE ANIMADO
            Swal.fire({
                icon: 'success',
                title: '¡Excelente!',
                text: 'Las calificaciones han sido guardadas.',
                confirmButtonColor: '#004a99'
            });

            document.getElementById('seccion-lista').style.display = 'none';
        } catch (e) { 
            Swal.fire('Error', 'Hubo un fallo al guardar las notas.', 'error');
        }
    });
</script>
</body>
</html>
