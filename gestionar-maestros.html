<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestionar Maestros - Amor y Libertad</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Esto hace que en celulares se vea uno debajo del otro y no tan junto */
@media (max-width: 768px) {
    .grid-layout { grid-template-columns: 1fr; gap: 15px; }
    .gestion-container { padding: 10px; }
}
.btn-back { display: inline-block; margin-bottom: 10px; color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<header class="profile-header">
    <div class="cover-photo"><img src="Img/logo2.png" alt="Portada"></div>
    <div class="profile-info">
        <a href="dashboard-directora.html" class="btn-back">← Regresar al Dashboard</a>
        <div class="profile-logo"><img src="Img/logo.png" alt="Logo"></div>
        <div class="profile-text"><h1>Gestionar Maestros</h1><p>Panel Administrativo</p></div>
    </div>
</header>

<main class="gestion-container grid-layout">
    <div class="card" style="padding: 30px; border-radius: 20px; background: #ffffff; border: 1px solid #e0e6ed;">
    <h3 style="margin-top: 0; color: var(--primary); font-size: 1.5rem; margin-bottom: 20px;">
         Nuevo Maestro
    </h3>
    
    <div class="input-group">
        <input type="text" id="nuevoUsuario" placeholder="Usuario (ej: maestro_juan)" 
               style="width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #eef2f7; border-radius: 12px; font-size: 1rem; transition: 0.3s; box-sizing: border-box;">
    </div>
    
    <div class="input-group">
        <input type="password" id="nuevaPass" placeholder="Clave temporal" 
               style="width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #eef2f7; border-radius: 12px; font-size: 1rem; transition: 0.3s; box-sizing: border-box;">
    </div>
    
    <button id="btn-registrar" class="btn btn-primary" 
            style="width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s;">
        Registrar Maestro
    </button>
</div>

    <!-- Lista de Maestros -->
    <div class="card">
        <h3>Maestros Registrados</h3>
        <table>
            <thead><tr><th>Usuario</th><th>Acción</th></tr></thead>
            <tbody id="lista-maestros"></tbody>
        </table>
    </div>
</main>

<script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    document.getElementById('btn-registrar').addEventListener('click', async () => {
        const usuarioInput = document.getElementById('nuevoUsuario').value;
        const pass = document.getElementById('nuevaPass').value;

        if (!usuarioInput || !pass) {
            alert("Por favor, rellena ambos campos.");
            return;
        }

        // Aquí hacemos la magia: le agregamos el dominio automáticamente
        const emailCompleto = `${usuarioInput}@amorylibertad.org`;

        try {
            // 1. Crear usuario en Firebase Authentication
            await createUserWithEmailAndPassword(auth, emailCompleto, pass);
            
            // 2. Guardar datos en Firestore
            await setDoc(doc(db, "usuarios", usuarioInput), {
                usuario: usuarioInput,
                rol: "maestro",
                email: emailCompleto
            });

            alert("¡Maestro registrado con éxito como: " + emailCompleto);
            location.reload(); 
        } catch (error) {
            console.error("Error detallado:", error);
            alert("Error al registrar: " + error.message);
        }
    });
</script>
</body>
</html>
