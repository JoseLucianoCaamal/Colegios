<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestionar Maestros - Amor y Libertad</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .gestion-container { max-width: 900px; margin: 20px auto; padding: 20px; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header class="profile-header">
    <div class="cover-photo"><img src="Img/logo2.png" alt="Portada"></div>
    <div class="profile-info">
        <div class="profile-logo"><img src="Img/logo.png" alt="Logo"></div>
        <div class="profile-text"><h1>Gestionar Maestros</h1><p>Panel Administrativo</p></div>
    </div>
</header>

<main class="gestion-container grid-layout">
    <div class="card" style="padding: 30px; border-radius: 20px; background: #ffffff; border: 1px solid #e0e6ed;">
    <h3 style="margin-top: 0; color: var(--primary); font-size: 1.5rem; margin-bottom: 20px;">
         Nuevo Maestro
    </h3>
    
    <div class="input-group">
        <input type="text" id="nuevoUsuario" placeholder="Usuario (ej: maestro_juan)" 
               style="width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #eef2f7; border-radius: 12px; font-size: 1rem; transition: 0.3s; box-sizing: border-box;">
    </div>
    
    <div class="input-group">
        <input type="password" id="nuevaPass" placeholder="Clave temporal" 
               style="width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #eef2f7; border-radius: 12px; font-size: 1rem; transition: 0.3s; box-sizing: border-box;">
    </div>
    
    <button id="btn-registrar" class="btn btn-primary" 
            style="width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s;">
        Registrar Maestro
    </button>
</div>

    <!-- Lista de Maestros -->
    <div class="card">
        <h3>Maestros Registrados</h3>
        <table>
            <thead><tr><th>Usuario</th><th>Acción</th></tr></thead>
            <tbody id="lista-maestros"></tbody>
        </table>
    </div>
</main>

<script type="module">
    import { db } from './js/firebase-config.js';
    import { collection, getDocs, doc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    async function cargarMaestros() {
        const querySnapshot = await getDocs(collection(db, "usuarios"));
        const lista = document.getElementById('lista-maestros');
        lista.innerHTML = "";
        
        querySnapshot.forEach((docSnap) => {
            const data = docSnap.data();
            if(data.rol === "maestro") {
                const fila = `<tr><td>${data.usuario}</td>
                    <td><button class="btn-delete" onclick="eliminar('${docSnap.id}')">Eliminar</button></td></tr>`;
                lista.innerHTML += fila;
            }
        });
    }

    window.eliminar = async (id) => {
        if(confirm("¿Eliminar a este maestro?")) {
            await deleteDoc(doc(db, "usuarios", id));
            cargarMaestros();
        }
    };

    cargarMaestros();
</script>
</body>
</html>
