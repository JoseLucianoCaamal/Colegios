<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Gestionar Maestros - Amor y Libertad</title>
    <link rel="icon" type="image/png" href="Img/logo.png">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .card { padding: 30px; border-radius: 20px; background: #ffffff; border: 1px solid #e0e6ed; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-back-clean { display: inline-flex; align-items: center; gap: 5px; margin-bottom: 15px; color: #666; text-decoration: none; font-weight: bold; }
        .input-control { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; transition: 0.3s;}
        .input-control:focus { border-color: #004a99; }
        label { font-size: 0.85rem; font-weight: bold; color: #8898aa; display: block; margin-bottom: 5px; text-transform: uppercase;}
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.95rem; min-width: 500px;}
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-delete:hover { background: #c62828; }
    </style>
</head>
<body>

<header class="profile-header">
    <div class="cover-photo"><img src="Img/logo2.png" alt="Portada"></div>
    <div class="profile-info">
        <a href="dashboard-directora.html" class="btn-back-clean">⬅ Regresar al Dashboard</a>
        <div class="profile-text">
            <h1>Gestionar Maestros</h1>
            <p>Panel Administrativo</p>
        </div>
    </div>
</header>

<main class="grid-layout">
    <section class="card">
        <h3 style="margin-top:0; color:#004a99;">✨ Nuevo Maestro</h3>
        <label>Nombre Completo del Docente</label>
        <input type="text" id="nombreMaestro" class="input-control" placeholder="Ej: Mtra. Sofía Martínez">
        <label>Nombre de Usuario</label>
        <input type="text" id="usuarioMaestro" class="input-control" placeholder="Ej: Mtr.Juan">
        <label>Contraseña Temporal</label>
        <input type="password" id="claveMaestro" class="input-control" placeholder="Mínimo 6 caracteres">
        <button id="btn-registrar" class="btn btn-primary" style="width:100%; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold;">REGISTRAR MAESTRO</button>
    </section>

    <section class="card">
        <h3 style="margin-top:0; color:#004a99;">📋 Maestros Registrados</h3>
        <p style="color:#c62828; font-size:0.85rem; font-weight:bold;">Borrar un maestro revocará su acceso al sistema inmediatamente.</p>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Usuario</th>
                        <th style="text-align: center;">Acción</th>
                    </tr>
                </thead>
                <tbody id="lista-maestros">
                    <tr><td colspan="3" style="text-align:center;">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, setDoc, deleteDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    function cargarLista() {
        const q = query(collection(db, "usuarios"), where("rol", "==", "maestro"));
        onSnapshot(q, (snapshot) => {
            const tbody = document.getElementById('lista-maestros');
            tbody.innerHTML = "";
            
            if(snapshot.empty) {
                tbody.innerHTML = "<tr><td colspan='3' style='text-align:center;'>No hay maestros registrados.</td></tr>";
                return;
            }

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const tr = document.createElement('tr');
                
                // Mostrar el nombre original si existe, si no el ID
                const usuarioVisible = data.usuario_original || docSnap.id;

                tr.innerHTML = `
                    <td style="font-weight:bold;">${data.nombre}</td>
                    <td style="color:#004a99; font-weight:bold;">${usuarioVisible}</td>
                    <td style="text-align: center;">
                        <button class="btn-delete">🗑️ Eliminar</button>
                    </td>
                `;

                tr.querySelector('.btn-delete').addEventListener('click', () => {
                    Swal.fire({
                        title: '¿Despedir / Eliminar Maestro?',
                        html: `Estás a punto de quitarle el acceso al sistema a:<br><br><b>${data.nombre}</b>`,
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#c62828',
                        cancelButtonColor: '#666',
                        confirmButtonText: 'Sí, eliminar acceso'
                    }).then(async (result) => {
                        if (result.isConfirmed) {
                            try {
                                await deleteDoc(doc(db, "usuarios", docSnap.id));
                                Swal.fire('Eliminado', 'El docente ya no tiene acceso al sistema.', 'success');
                            } catch (error) {
                                Swal.fire('Error', 'Hubo un problema al borrar el usuario.', 'error');
                            }
                        }
                    });
                });

                tbody.appendChild(tr);
            });
        });
    }
    
    cargarLista();

    document.getElementById('btn-registrar').addEventListener('click', async () => {
        const nombre = document.getElementById('nombreMaestro').value.trim();
        const usuarioOriginal = document.getElementById('usuarioMaestro').value.trim();
        const usuarioMin = usuarioOriginal.toLowerCase().replace(/\s+/g, '');
        const clave = document.getElementById('claveMaestro').value;

        if (!nombre || !usuarioOriginal || !clave) return Swal.fire('Campos Vacíos', 'Llena todos los datos.', 'warning');
        if (clave.length < 6) return Swal.fire('Error', 'La contraseña debe tener mínimo 6 caracteres.', 'error');

        Swal.fire({ title: 'Registrando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            const emailCompleto = `${usuarioMin}@amorylibertad.org`;
            
            const appSecundaria = initializeApp(auth.app.options, "AppSecundaria");
            const authSecundario = getAuth(appSecundaria);
            
            try {
                // Intentamos crear la cuenta en Auth
                await createUserWithEmailAndPassword(authSecundario, emailCompleto, clave);
            } catch (errAuth) {
                // BYPASS MAGISTRAL: Si ya existe en Auth (porque lo borraste y recreaste), ignoramos el error.
                if (errAuth.code === 'auth/email-already-in-use') {
                    console.log("Restaurando maestro eliminado previamente...");
                } else {
                    throw errAuth; // Si es otro error, detenemos.
                }
            }
            await authSecundario.signOut(); 
            
            // Forzamos guardar/restaurar en la base de datos con el formato que escribieron
            await setDoc(doc(db, "usuarios", usuarioMin), { 
                email: emailCompleto, 
                rol: "maestro", 
                nombre: nombre,
                usuario_original: usuarioOriginal 
            });

            Swal.fire('¡Éxito!', 'Maestro creado y habilitado.', 'success');
            document.getElementById('nombreMaestro').value = '';
            document.getElementById('usuarioMaestro').value = '';
            document.getElementById('claveMaestro').value = '';

        } catch (error) {
            Swal.fire('Error', 'Hubo un error de conexión.', 'error');
        }
    });
</script>
</body>
</html>
