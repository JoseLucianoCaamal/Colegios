<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- ESTA ES LA LÍNEA MÁGICA PARA CELULARES -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Gestionar Maestros - Amor y Libertad</title>
    <link rel="icon" type="image/png" href="Img/logo.png">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .card { padding: 30px; border-radius: 20px; background: #ffffff; border: 1px solid #e0e6ed; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-back-clean { display: inline-flex; align-items: center; gap: 5px; margin-bottom: 15px; color: #666; text-decoration: none; font-weight: bold; }
        .input-control { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; transition: 0.3s;}
        .input-control:focus { border-color: #004a99; }
        label { font-size: 0.85rem; font-weight: bold; color: #8898aa; display: block; margin-bottom: 5px; text-transform: uppercase;}
    </style>
</head>
<body>

<header class="profile-header">
    <div class="cover-photo"><img src="Img/logo2.png" alt="Portada"></div>
    <div class="profile-info">
        <a href="dashboard-directora.html" class="btn-back-clean">⬅ Regresar al Dashboard</a>
        <div class="profile-text">
            <h1>Gestionar Maestros</h1>
            <p>Panel Administrativo</p>
        </div>
    </div>
</header>

<main class="grid-layout">
    <section class="card">
        <h3 style="margin-top:0; color:#004a99;">✨ Nuevo Maestro</h3>
        
        <label>Nombre Completo del Docente</label>
        <input type="text" id="nombreMaestro" class="input-control" placeholder="Ej: Maestra María José López">
        
        <label>Nombre de Usuario</label>
        <input type="text" id="usuarioMaestro" class="input-control" placeholder="Ej: maria.lopez">
        
        <label>Contraseña Temporal</label>
        <input type="password" id="claveMaestro" class="input-control" placeholder="Mínimo 6 caracteres">
        
        <button id="btn-registrar" class="btn btn-primary" style="width:100%; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold;">REGISTRAR MAESTRO</button>
    </section>

    <section class="card">
        <h3 style="margin-top:0; color:#004a99;">📋 Maestros Registrados</h3>
        <p style="color:#666; font-size:0.9rem;">Los maestros gestionan sus propias contraseñas tras el primer inicio de sesión.</p>
    </section>
</main>

<script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    document.getElementById('btn-registrar').addEventListener('click', async () => {
        const nombre = document.getElementById('nombreMaestro').value.trim();
        const usuario = document.getElementById('usuarioMaestro').value.trim().toLowerCase();
        const clave = document.getElementById('claveMaestro').value;

        if (!nombre || !usuario || !clave) {
            Swal.fire('Campos Vacíos', 'Por favor llena todos los datos del maestro.', 'warning');
            return;
        }

        if (clave.length < 6) {
            Swal.fire('Contraseña Corta', 'La contraseña debe tener al menos 6 caracteres.', 'error');
            return;
        }

        Swal.fire({ title: 'Registrando Maestro...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            const emailCompleto = `${usuario}@amorylibertad.org`;
            
            // 1. Creamos la cuenta en Firebase
            await createUserWithEmailAndPassword(auth, emailCompleto, clave);
            
            // 2. Guardamos su NOMBRE REAL en la base de datos
            await setDoc(doc(db, "usuarios", usuario), {
                email: emailCompleto,
                rol: "maestro",
                nombre: nombre
            });

            Swal.fire({
                icon: 'success',
                title: '¡Maestro Registrado!',
                text: 'Por protocolos de seguridad, el sistema cerrará esta sesión para aplicar los permisos. Vuelve a ingresar con tu cuenta de Directora.',
                confirmButtonColor: '#004a99',
                confirmButtonText: 'Entendido'
            }).then(() => {
                window.location.href = "login.html";
            });

        } catch (error) {
            Swal.fire('Error al registrar', 'Ese usuario ya existe o hubo un fallo de conexión.', 'error');
            console.error(error);
        }
    });
</script>
</body>
</html>
