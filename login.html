<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Amor y Libertad</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="Img/logo.png">
    <style>
        /* Estilo específico para centrar el login */
        .login-body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #001f3f; /* Azul marino */
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card img { width: 80px; margin-bottom: 20px; }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box; /* Importante para que no se desborde */
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="login-body">

<div class="login-card">
    <img src="Img/logo.png" alt="Logo">
    <h2>Iniciar Sesión</h2>
    <p>Bienvenido al sistema administrativo</p>
    
    <!-- CAMBIAMOS A TEXTO PARA EL USUARIO -->
    <input type="text" id="usuario" placeholder="Nombre de usuario">
    <input type="password" id="password" placeholder="Contraseña">
    
    <!-- BOTÓN CON ID PARA CONECTARLO AL JS -->
    <button id="btn-entrar">Entrar al Sistema</button>
    
    <p style="margin-top: 20px; font-size: 0.8rem;">
        <a href="index.html">← Regresar al sitio</a>
    </p>
</div>

<!-- BORRA EL SCRIPT ANTIGUO Y PON ESTE -->
<script type="module">
    import { iniciarSesion } from './js/auth-logic.js';

    // Asegúrate de que el botón tenga el ID 'btn-entrar'
    document.getElementById('btn-entrar').addEventListener('click', () => {
        const user = document.getElementById('usuario').value;
        const pass = document.getElementById('password').value;

        if (!user || !pass) {
            alert("Por favor, ingresa usuario y contraseña.");
            return;
        }

        iniciarSesion(user, pass);
    });
</script>

</body>
</html>
