<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio de Alumnos - Amor y Libertad</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .container { max-width: 950px; margin: 30px auto; padding: 0 20px; }
        .card { padding: 30px; border-radius: 20px; background: #ffffff; border: 1px solid #eef2f7; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* Contenedor de los filtros y buscador en línea */
        .filtros-container { display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
        .filtro-item { flex: 1; min-width: 250px; }
        .filtro-item label { font-weight: bold; color: #555; display: block; margin-bottom: 8px; font-size: 0.9rem;}
        .input-control { width: 100%; padding: 12px 15px; border: 2px solid #eef2f7; border-radius: 10px; font-size: 1rem; box-sizing: border-box; outline: none; transition: 0.3s;}
        .input-control:focus { border-color: #004a99; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.95rem; }
        th { padding: 15px; text-align: left; border-bottom: 2px solid #eef2f7; color: #8898aa; text-transform: uppercase; font-size: 0.85rem;}
        td { padding: 15px; text-align: left; border-bottom: 1px solid #f4f7fa; }
        tr { transition: background 0.2s; }
        tr:hover { background: #f8fbff; }
        .btn-back-clean { display: inline-flex; align-items: center; gap: 5px; color: #7f8fa4; text-decoration: none; font-weight: bold; margin-bottom: 15px; transition: 0.3s;}
        .btn-back-clean:hover { color: #004a99; transform: translateX(-5px); }
    </style>
</head>
<body>

<header class="profile-header">
    <div class="cover-photo"><img src="Img/logo2.png" alt="Portada"></div>
    <div class="profile-info">
        <a href="dashboard-maestro.html" class="btn-back-clean">⬅ Volver al Panel</a>
        <div class="profile-text">
            <h1>Directorio Escolar</h1>
            <p>Consulta de Alumnos y Contactos</p>
        </div>
    </div>
</header>

<main class="container">
    <section class="card">
        
        <div class="filtros-container">
            <div class="filtro-item">
                <label>🏫 Filtrar por Grupo:</label>
                <select id="filtroGrupo" class="input-control">
                    <option value="Todos">Cargando grupos oficiales...</option>
                </select>
            </div>
            
            <div class="filtro-item">
                <label>🔍 Buscar por Nombre:</label>
                <input type="text" id="buscadorAlumno" class="input-control" placeholder="Escribe el nombre del alumno...">
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Alumno</th>
                    <th>Grupo</th>
                    <th>Tutor y Contacto</th>
                    <th>Datos Médicos</th>
                </tr>
            </thead>
            <tbody id="tabla-directorio">
                <!-- Se llena con JS -->
            </tbody>
        </table>
    </section>
</main>

<script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const filtroGrupo = document.getElementById('filtroGrupo');
    const buscadorAlumno = document.getElementById('buscadorAlumno');
    const tabla = document.getElementById('tabla-directorio');
    
    // Aquí guardaremos la lista completa para buscar rápidamente
    let todosLosAlumnos = []; 

    // Verificación de seguridad inicial
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "login.html";
        } else {
            cargarGruposOficiales();
            cargarDirectorioCompleto();
        }
    });

    // 1. Cargar los grupos que configuró la Directora
    async function cargarGruposOficiales() {
        try {
            const querySnapshot = await getDocs(collection(db, "grupos"));
            filtroGrupo.innerHTML = '<option value="Todos">Mostrar Todos</option>';
            
            querySnapshot.forEach((docSnap) => {
                const nombre = docSnap.data().nombre;
                filtroGrupo.innerHTML += `<option value="${nombre}">${nombre}</option>`;
            });
        } catch (error) {
            console.error("Error al cargar grupos:", error);
            filtroGrupo.innerHTML = '<option value="Todos">Error al cargar grupos</option>';
        }
    }

    // 2. Descargar todos los alumnos a la memoria local
    async function cargarDirectorioCompleto() {
        tabla.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:30px; color:#8898aa;'>Descargando directorio... ⏳</td></tr>";
        try {
            const querySnapshot = await getDocs(collection(db, "alumnos"));
            todosLosAlumnos = []; // Vaciamos la lista local
            
            querySnapshot.forEach((docSnap) => {
                todosLosAlumnos.push(docSnap.data());
            });
            
            // Una vez descargados, los pintamos en pantalla
            renderizarTabla();
        } catch (error) {
            tabla.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#ff4d4d;'>Error al conectar con la base de datos.</td></tr>";
        }
    }

    // 3. Función para pintar la tabla y aplicar filtros a velocidad luz
    function renderizarTabla() {
        const grupoSeleccionado = filtroGrupo.value;
        const textoBusqueda = buscadorAlumno.value.toLowerCase().trim();

        tabla.innerHTML = "";
        let contador = 0;

        todosLosAlumnos.forEach(data => {
            // Evaluamos si el alumno cumple con los filtros
            const pasaFiltroGrupo = (grupoSeleccionado === "Todos" || data.grupo === grupoSeleccionado);
            const pasaFiltroTexto = data.nombre.toLowerCase().includes(textoBusqueda);

            if (pasaFiltroGrupo && pasaFiltroTexto) {
                contador++;
                tabla.innerHTML += `
                    <tr>
                        <td style="font-weight:bold; color:#004a99; font-size:1.05rem;">${data.nombre}</td>
                        <td><span style="background:#f4f7fa; padding:5px 12px; border-radius:20px; font-size:0.85rem; font-weight:bold; color:#555;">${data.grupo}</span></td>
                        <td>${data.tutor}<br><span style="color:#666; font-size:0.85rem;">📞 ${data.telefono}</span></td>
                        <td style="color:#e63946; font-weight:bold; font-size:0.9rem;">${data.alergias}</td>
                    </tr>
                `;
            }
        });

        if (contador === 0) {
            tabla.innerHTML = `<tr><td colspan='4' style='text-align:center; padding:30px; color:#8898aa;'>No se encontraron alumnos con esos parámetros. 🤷‍♂️</td></tr>`;
        }
    }

    // 4. Escuchamos cada vez que se cambia el grupo o se escribe en el buscador
    filtroGrupo.addEventListener('change', renderizarTabla);
    buscadorAlumno.addEventListener('input', renderizarTabla);

</script>
</body>
</html>
