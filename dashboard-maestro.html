<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Maestros - Amor y Libertad</title>
    <link rel="icon" type="image/png" href="Img/logo.png">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .grid-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .option-card { background: white; padding: 40px 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: transform 0.3s; border: 1px solid #eef2f7;}
        .option-card:hover { transform: translateY(-5px); border-color:#004a99;}
        .option-icon { font-size: 3rem; margin-bottom: 15px; display: block; }
        .logout-container { max-width: 1000px; margin: auto; text-align: right; padding: 10px 20px; }
        .btn-logout { background: #ff4d4d; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header class="profile-header">
    <div class="cover-photo"><img src="Img/logo2.png" alt="Portada"></div>
    <div class="profile-info">
        <div class="profile-logo"><img src="Img/logo.png" alt="Logo"></div>
        <div class="profile-text">
            <!-- AQUÍ CAMBIARÁ EL NOMBRE DINÁMICAMENTE -->
            <h1 id="saludo-maestro">Cargando perfil...</h1>
            <p>Panel de Control Docente</p>
        </div>
    </div>
</header>

<div class="logout-container">
    <button id="btn-logout" class="btn-logout">Cerrar Sesión</button>
</div>

<main>
    <div class="grid-options">
        <div class="option-card">
            <span class="option-icon">🧒</span><h3>Directorio</h3>
            <a href="ver-alumnos.html" class="btn btn-primary">ENTRAR</a>
        </div>
        <div class="option-card">
            <span class="option-icon">📁</span><h3>Documentos</h3>
            <p style="color: #666; font-size: 0.8rem; margin-bottom: 15px;">Listas, Calificaciones y Fichas.</p>
            <a href="documentos-maestro.html" class="btn btn-primary" style="background:#004a99; border:none;">ABRIR CARPETA</a>
        </div>
        <div class="option-card">
            <span class="option-icon">📚</span><h3>Mis Materias</h3>
            <a href="materias.html" class="btn btn-primary">ENTRAR</a>
        </div>
        <div class="option-card">
            <span class="option-icon">📸</span><h3>Subir Fotos</h3>
            <a href="fotos.html" class="btn btn-primary">ENTRAR</a>
        </div>
        <div class="option-card">
            <span class="option-icon">🔒</span><h3>Seguridad</h3>
            <a href="cambiar-password.html" class="btn btn-primary">CAMBIAR CLAVE</a>
        </div>
    </div>
</main>

<script type="module">
    import { auth, db } from './js/firebase-config.js';
    import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    onAuthStateChanged(auth, async (user) => { 
        if (!user) {
            window.location.href = "login.html"; 
        } else {
            // Buscamos el nombre real del maestro
            const idUsuario = user.email.split('@')[0];
            const docRef = doc(db, "usuarios", idUsuario);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists() && docSnap.data().nombre) {
                document.getElementById('saludo-maestro').innerText = `Hola, ${docSnap.data().nombre}`;
            } else {
                document.getElementById('saludo-maestro').innerText = `Hola, Maestro(a)`;
            }
        }
    });

    document.getElementById('btn-logout').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "login.html");
    });
</script>
</body>
</html>
