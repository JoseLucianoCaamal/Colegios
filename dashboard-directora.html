<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Directora - Amor y Libertad</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Reutilizamos el header del perfil para que no se sienta ajeno -->
<header class="profile-header">
    <div class="cover-photo"><img src="Img/logo2.png" alt="Portada"></div>
    <div class="profile-info">
        <div class="profile-logo"><img src="Img/logo.png" alt="Logo"></div>
        <div class="profile-text"><h1>Hola, Directora</h1><p>Panel de Administración</p></div>
    </div>
    <button id="btn-logout" class="btn btn-secondary">Cerrar Sesión</button>

    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        });

    </script>
</header>

<main class="container">
    <div class="section-title"><h2>¿Qué haremos hoy?</h2></div>
    
    <!-- Usamos 'contact-grid' porque ya tiene el estilo de tarjetas bonitas que te gusta -->
    <div class="contact-grid">
        <div class="modern-card">
            <div class="card-icon">👥</div>
            <h3>Gestionar Maestros</h3>
            <p>Alta y baja de personal docente.</p>
            <a href="gestionar-maestros.html" class="btn btn-primary">ENTRAR</a>
        </div>
        
        <div class="modern-card">
            <div class="card-icon">📸</div>
            <h3>Revisar Fotos</h3>
            <p>Supervisar contenido publicado.</p>
            <a href="fotos.html" class="btn btn-primary">ENTRAR</a>
        </div>
        
        <div class="modern-card">
            <div class="card-icon">📌</div>
            <h3>Avisos</h3>
            <p>Editar la pizarra escolar.</p>
            <a href="#" class="btn btn-primary">Entrar</a>
        </div>
    </div>
</main>

<script src="js/app.js"></script>
</body>
</html>
