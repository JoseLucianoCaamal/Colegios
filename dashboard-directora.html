<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Directora - Amor y Libertad</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .grid-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .option-card { background: white; padding: 40px 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: transform 0.3s; border: 1px solid #eef2f7;}
        .option-card:hover { transform: translateY(-5px); border-color:#004a99;}
        .option-icon { font-size: 3rem; margin-bottom: 15px; display: block; }
        .logout-container { max-width: 1000px; margin: auto; text-align: right; padding: 10px 20px; }
        .btn-logout { background: #ff4d4d; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header class="profile-header">
    <div class="cover-photo"><img src="Img/logo2.png" alt="Portada"></div>
    <div class="profile-info">
        <div class="profile-logo"><img src="Img/logo.png" alt="Logo"></div>
        <div class="profile-text"><h1>Hola, Directora</h1><p>Panel de Control Principal</p></div>
    </div>
</header>

<div class="logout-container"><button id="btn-logout" class="btn-logout">Cerrar Sesión</button></div>

<main>
    <div class="grid-options">
        <div class="option-card">
            <span class="option-icon">👨‍🏫</span><h3>Gestionar Maestros</h3>
            <a href="gestionar-maestros.html" class="btn btn-primary">ENTRAR</a>
        </div>
        <div class="option-card">
            <span class="option-icon">🏫</span><h3>Configurar Grupos</h3>
            <a href="gestionar-grupos.html" class="btn btn-primary" style="background:#FF9800; border:none; color:#333;">ENTRAR</a>
        </div>
        <div class="option-card">
            <span class="option-icon">📊</span><h3>Supervisión Académica</h3>
            <a href="supervision.html" class="btn btn-primary" style="background:#8e44ad; border:none;">SUPERVISAR</a>
        </div>
        <!-- NUEVA OPCIÓN PARA DESCARGAR FICHAS -->
        <div class="option-card">
            <span class="option-icon">🗂️</span><h3>Descargar Fichas</h3>
            <p style="color: #666; font-size: 0.8rem; margin-bottom: 15px;">Exporta los resúmenes en formato ZIP.</p>
            <a href="descargar-fichas.html" class="btn btn-primary" style="background:#004a99; border:none;">DESCARGAR ZIP</a>
        </div>
        <div class="option-card">
            <span class="option-icon">🔒</span><h3>Mi Seguridad</h3>
            <a href="cambiar-password.html" class="btn btn-primary">CAMBIAR CLAVE</a>
        </div>
    </div>
</main>

<script type="module">
    import { auth } from './js/firebase-config.js';
    import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "login.html"; });
    document.getElementById('btn-logout').addEventListener('click', () => { signOut(auth).then(() => { window.location.href = "login.html"; }); });
</script>
</body>
</html>
