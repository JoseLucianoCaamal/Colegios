<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cambiar Contraseña</title>
    <link rel="stylesheet" href="css/styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Img/logo.png">
    <style>
        .container { max-width: 500px; margin: 50px auto; padding: 0 20px; }
        .card { padding: 40px; border-radius: 20px; background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .input-control { width: 100%; padding: 15px; border: 2px solid #eef2f7; border-radius: 10px; margin-bottom: 20px; box-sizing: border-box; font-size: 1rem; }
        .btn-back-clean { display: inline-block; margin-bottom: 20px; color: #666; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<main class="container">
    <a href="javascript:history.back()" class="btn-back-clean">⬅ Volver al Panel</a>
    
    <section class="card">
        <h2 style="color:#004a99; margin-top:0; text-align:center;">🔒 Actualizar Clave</h2>
        <p style="color:#666; text-align:center; margin-bottom:30px;">Crea una nueva contraseña segura para tu cuenta.</p>
        
        <label style="font-weight:bold;">Nueva Contraseña</label>
        <input type="password" id="nuevaPass" class="input-control" placeholder="Mínimo 6 caracteres">
        
        <label style="font-weight:bold;">Confirmar Contraseña</label>
        <input type="password" id="confirmarPass" class="input-control" placeholder="Repite la contraseña">
        
        <button id="btn-cambiar" class="btn btn-primary" style="width:100%; padding:15px; border-radius:50px; font-weight:bold; font-size:1.1rem; border:none; cursor:pointer;">ACTUALIZAR CONTRASEÑA</button>
    </section>
</main>

<script type="module">
    import { auth } from './js/firebase-config.js';
    import { updatePassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    let usuarioActual = null;
    onAuthStateChanged(auth, (user) => {
        if (user) usuarioActual = user;
        else window.location.href = "login.html";
    });

    document.getElementById('btn-cambiar').addEventListener('click', async () => {
        const p1 = document.getElementById('nuevaPass').value;
        const p2 = document.getElementById('confirmarPass').value;

        if (p1.length < 6) return alert("La contraseña debe tener al menos 6 caracteres.");
        if (p1 !== p2) return alert("Las contraseñas no coinciden.");

        try {
            await updatePassword(usuarioActual, p1);
            alert("¡Contraseña actualizada con éxito!");
            history.back(); // Regresa al panel anterior
        } catch (error) {
            if (error.code === 'auth/requires-recent-login') {
                alert("Por seguridad, debes cerrar sesión, volver a entrar y reintentar el cambio de contraseña.");
            } else {
                alert("Error al actualizar: " + error.message);
            }
        }
    });
</script>
</body>
</html>
