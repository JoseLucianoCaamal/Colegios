<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Fotos - Amor y Libertad</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- LIBRERÍAS EXTERNAS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .card { padding: 30px; border-radius: 20px; background: #ffffff; border: 1px solid #eef2f7; box-shadow: 0 8px 16px rgba(0,0,0,0.03); margin-bottom: 25px; }
        .filters-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; align-items: end; }
        .input-control { width: 100%; padding: 12px; border: 2px solid #eef2f7; border-radius: 8px; font-size: 1rem; outline:none;}
        .input-control:focus {border-color: #FF9800;}
        label { font-size: 0.85rem; font-weight: bold; color: #8898aa; display: block; margin-bottom: 5px; text-transform: uppercase;}
        .btn-back-clean { display: inline-flex; align-items: center; gap: 5px; color: #666; text-decoration: none; font-weight: bold; margin-bottom: 15px; }
        
        /* GALERÍA GRID */
        .photo-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .photo-item { position: relative; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: transform 0.3s;}
        .photo-item:hover { transform: scale(1.03); }
        .photo-item img { width: 100%; height: 200px; object-fit: cover; display: block; }
        .photo-info { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.7); color: white; padding: 8px; font-size: 0.8rem; box-sizing: border-box;}
        .btn-delete-photo { position: absolute; top: 5px; right: 5px; background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header class="profile-header">
    <div class="cover-photo"><img src="Img/logo2.png" alt="Portada"></div>
    <div class="profile-info">
        <a href="dashboard-maestro.html" class="btn-back-clean">⬅ Volver al Panel</a>
        <div class="profile-text">
            <h1>Galería Escolar</h1>
            <p>Sube y administra evidencias fotográficas</p>
        </div>
    </div>
</header>

<main class="container">
    <section class="card">
        <div class="filters-grid">
            <div>
                <label>Selecciona el Grupo</label>
                <select id="filtroGrupo" class="input-control"><option value="">Cargando...</option></select>
            </div>
            <div>
                <button id="btn-subir-foto" class="btn" style="width:100%; padding:14px; border-radius:8px; background:#4CAF50; color:white; font-weight:bold; font-size:1.1rem; border:none; cursor:pointer;" disabled>
                    📸 Subir Nueva Foto
                </button>
            </div>
        </div>
    </section>

    <section class="card">
        <h3 style="margin-top:0; color:#004a99;">Evidencias del Grupo</h3>
        <div id="galeria" class="photo-gallery">
            <p style="grid-column: 1 / -1; text-align: center; color: #666;">Selecciona un grupo para ver las fotos.</p>
        </div>
    </section>
</main>

<script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { collection, query, where, getDocs, addDoc, deleteDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const filtroGrupo = document.getElementById('filtroGrupo');
    const galeria = document.getElementById('galeria');
    const btnSubir = document.getElementById('btn-subir-foto');
    
    let maestroActual = null;

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "login.html";
        else { 
            // Soporte para suplentes
            maestroActual = localStorage.getItem('supliendo_a') || user.email;
            cargarGrupos(); 
        }
    });

    async function cargarGrupos() {
        const snap = await getDocs(collection(db, "grupos"));
        filtroGrupo.innerHTML = '<option value="">Seleccione grupo...</option>';
        snap.forEach(doc => filtroGrupo.innerHTML += `<option value="${doc.data().nombre}">${doc.data().nombre}</option>`);
    }

    filtroGrupo.addEventListener('change', () => {
        if(filtroGrupo.value) {
            btnSubir.disabled = false;
            cargarFotos();
        } else {
            btnSubir.disabled = true;
            galeria.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: #666;">Selecciona un grupo para ver las fotos.</p>';
        }
    });

    async function cargarFotos() {
        const grupoSel = filtroGrupo.value;
        galeria.innerHTML = '<p style="grid-column: 1 / -1; text-align: center;">Cargando imágenes... ⏳</p>';
        
        try {
            const qFotos = query(collection(db, "fotos"), where("grupo", "==", grupoSel));
            const snap = await getDocs(qFotos);
            
            galeria.innerHTML = '';
            let contador = 0;

            snap.forEach((docSnap) => {
                contador++;
                const data = docSnap.data();
                const fechaFormat = data.fecha ? data.fecha.toDate().toLocaleDateString() : 'Sin fecha';
                
                const div = document.createElement('div');
                div.className = 'photo-item';
                div.innerHTML = `
                    <button class="btn-delete-photo" title="Borrar foto">X</button>
                    <a href="${data.url}" target="_blank">
                        <img src="${data.url}" alt="Evidencia">
                    </a>
                    <div class="photo-info">${fechaFormat}</div>
                `;

                // Botón de eliminar de Firestore
                div.querySelector('.btn-delete-photo').addEventListener('click', async () => {
                    const { isConfirmed } = await Swal.fire({
                        title: '¿Borrar imagen?',
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#ff4d4d',
                        confirmButtonText: 'Sí, borrar'
                    });

                    if(isConfirmed) {
                        await deleteDoc(doc(db, "fotos", docSnap.id));
                        cargarFotos(); // Recargar galería
                    }
                });

                galeria.appendChild(div);
            });

            if(contador === 0) {
                galeria.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: #666;">No hay fotos para este grupo.</p>';
            }

        } catch(e) {
            galeria.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: #ff4d4d;">Error al cargar las fotos.</p>';
        }
    }

    // ==========================================
    // WIDGET DE CLOUDINARY
    // ==========================================
    var myWidget = cloudinary.createUploadWidget({
        cloudName: 'eaeuplpl', // Pon aquí el nombre de tu nube
        uploadPreset: 'colegio_fotos', // Pon aquí el nombre de tu preset (ej: colegio_fotos)
        sources: ['local', 'camera'],
        multiple: true,
        maxFileSize: 5000000, // Máximo 5MB por foto
        language: "es",
        text: {
            es: {
                menu: { files: "Mis Archivos", camera: "Cámara" },
                local: { browse: "Seleccionar", dd_title_single: "Arrastra la foto aquí" }
            }
        }
    }, async (error, result) => { 
        if (!error && result && result.event === "success") { 
            // Cuando la foto sube a Cloudinary con éxito, guardamos la URL en Firestore
            const urlSegura = result.info.secure_url;
            
            try {
                await addDoc(collection(db, "fotos"), {
                    url: urlSegura,
                    grupo: filtroGrupo.value,
                    maestro_email: maestroActual,
                    fecha: new Date()
                });
                
                // Recargamos la galería para mostrar la nueva foto
                cargarFotos();
            } catch(e) {
                console.error("Error al guardar enlace en BD", e);
            }
        }
    });

    document.getElementById('btn-subir-foto').addEventListener('click', () => {
        myWidget.open();
    });

</script>
</body>
</html>
