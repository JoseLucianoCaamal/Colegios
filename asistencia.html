<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pase de Lista - Amor y Libertad</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #f4f7fa; }
        .container { max-width: 950px; margin: 30px auto; padding: 0 20px; }
        .card { padding: 30px; border-radius: 20px; background: #ffffff; border: 1px solid #eef2f7; box-shadow: 0 8px 16px rgba(0,0,0,0.03); margin-bottom: 25px; }
        .btn-back-clean { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 15px; color: #7f8fa4; text-decoration: none; font-weight: bold; }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; align-items: end; }
        .input-control { width: 100%; padding: 12px 15px; border: 2px solid #eef2f7; border-radius: 10px; font-family: inherit; font-size: 0.95rem; }
        label { font-size: 0.85rem; font-weight: 700; color: #8898aa; display: block; margin-bottom: 8px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; border-bottom: 1px solid #f4f7fa; text-align:left; }
        .student-name { font-weight: 600; color: #32325d; font-size: 1.05rem; }
        .attendance-options { display: flex; gap: 10px; justify-content: flex-end; }
        .attendance-options label { cursor: pointer; padding: 8px 18px; border-radius: 20px; background: #f4f7fa; color: #7f8fa4; font-weight: 700; font-size: 0.85rem; border: 2px solid transparent; }
        .attendance-options input[type="radio"] { display: none; }
        .attendance-options input[value="Presente"]:checked + label { background: #e8f5e9; color: #2e7d32; border-color: #4CAF50; }
        .attendance-options input[value="Retardo"]:checked + label { background: #fff8e1; color: #f57f17; border-color: #FFC107; }
        .attendance-options input[value="Falta"]:checked + label { background: #ffebee; color: #c62828; border-color: #F44336; }
        .btn-guardar { background: linear-gradient(135deg, #4CAF50, #2E7D32); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%;}
    </style>
</head>
<body>

<header class="profile-header">
    <div class="cover-photo"><img src="Img/logo2.png" alt="Portada"></div>
    <div class="profile-info">
        <a href="dashboard-maestro.html" class="btn-back-clean">⬅ Volver al Panel</a>
        <div class="profile-text">
            <h1>Pase de Lista</h1>
            <p style="color: #8898aa;">Control Diario de Asistencia</p>
        </div>
    </div>
</header>

<main class="container">
    <section class="card">
        <div class="filters-grid">
            <div>
                <label>Grupo</label>
                <select id="filtroGrupo" class="input-control">
                    <option value="">Cargando grupos...</option>
                </select>
            </div>
            <div>
                <label>Asignatura</label>
                <select id="materiaAsistencia" class="input-control">
                    <option value="">Esperando grupo...</option>
                </select>
            </div>
            <div>
                <label>Fecha</label>
                <input type="date" id="fechaAsistencia" class="input-control">
            </div>
            <div>
                <button id="btn-cargar-lista" class="btn btn-primary" style="width:100%; padding:12px; border-radius:10px; font-weight:bold;">Generar Lista</button>
            </div>
        </div>
    </section>

    <section class="card" id="seccion-lista" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eef2f7; padding-bottom: 15px; margin-bottom: 15px;">
            <h3 style="margin: 0; color: #004a99; font-size: 1.4rem;" id="titulo-lista">Alumnos</h3>
            <span style="background: #e8f5e9; color: #2e7d32; padding: 5px 12px; border-radius: 20px; font-weight: bold;" id="badge-fecha"></span>
        </div>
        
        <table>
            <thead><tr><th>Nombre del Alumno</th><th style="text-align: right; padding-right: 25px;">Estado de Asistencia</th></tr></thead>
            <tbody id="tabla-asistencia"></tbody>
        </table>
        
        <div style="display: flex; gap: 15px; margin-top: 30px;">
            <button id="btn-guardar-asistencia" class="btn-guardar" style="flex: 2;">✅ Confirmar y Guardar</button>
            <button id="btn-exportar-pdf" class="btn" style="flex: 1; background: #004a99; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer;">📄 Descargar PDF</button>
        </div>
    </section>
</main>

<script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    document.getElementById('fechaAsistencia').valueAsDate = new Date();
    const filtroGrupo = document.getElementById('filtroGrupo');
    const selectMateria = document.getElementById('materiaAsistencia');
    const btnCargar = document.getElementById('btn-cargar-lista');
    const tabla = document.getElementById('tabla-asistencia');
    const seccionLista = document.getElementById('seccion-lista');
    let alumnosActuales = [];

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "login.html";
        else cargarGruposOficiales();
    });

    // MAGIA: Cargar grupos creados por directora
    async function cargarGruposOficiales() {
        try {
            const querySnapshot = await getDocs(collection(db, "grupos"));
            filtroGrupo.innerHTML = '<option value="">Seleccione grupo...</option>';
            querySnapshot.forEach((docSnap) => {
                const nombre = docSnap.data().nombre;
                filtroGrupo.innerHTML += `<option value="${nombre}">${nombre}</option>`;
            });
        } catch (error) { filtroGrupo.innerHTML = '<option value="">Error al cargar</option>'; }
    }

    filtroGrupo.addEventListener('change', async () => {
        const grupoSeleccionado = filtroGrupo.value;
        selectMateria.innerHTML = "<option value=''>Cargando...</option>";
        if (!grupoSeleccionado) { selectMateria.innerHTML = "<option value=''>Esperando grupo...</option>"; return; }
        try {
            const qMaterias = query(collection(db, "materias"), where("grupo", "==", grupoSeleccionado));
            const querySnapshot = await getDocs(qMaterias);
            selectMateria.innerHTML = "<option value=''>Seleccione asignatura...</option>";
            let contador = 0;
            querySnapshot.forEach((docSnap) => {
                contador++;
                const data = docSnap.data();
                selectMateria.innerHTML += `<option value="${data.nombre}">${data.nombre}</option>`;
            });
            if (contador === 0) selectMateria.innerHTML = "<option value=''>Sin materias asignadas</option>";
        } catch (error) {}
    });

    btnCargar.addEventListener('click', async () => {
        const grupo = filtroGrupo.value; const materia = selectMateria.value; const fecha = document.getElementById('fechaAsistencia').value;
        if(!grupo || !materia) return alert("⚠️ Selecciona un grupo y una asignatura primero.");
        tabla.innerHTML = "<tr><td colspan='2' style='text-align:center;'>Buscando alumnos... 🔍</td></tr>";
        seccionLista.style.display = 'block'; alumnosActuales = [];
        document.getElementById('badge-fecha').innerText = fecha; document.getElementById('titulo-lista').innerText = `${grupo} - ${materia}`;

        try {
            const q = query(collection(db, "alumnos"), where("grupo", "==", grupo));
            const querySnapshot = await getDocs(q);
            tabla.innerHTML = ""; let contador = 0;
            querySnapshot.forEach((docSnap) => {
                contador++; const data = docSnap.data(); alumnosActuales.push(docSnap.id); 
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><div class="student-name">${data.nombre}</div></td>
                    <td>
                        <div class="attendance-options">
                            <input type="radio" name="ast_${docSnap.id}" id="p_${docSnap.id}" value="Presente" checked><label for="p_${docSnap.id}">✔️ P</label>
                            <input type="radio" name="ast_${docSnap.id}" id="r_${docSnap.id}" value="Retardo"><label for="r_${docSnap.id}">⏱️ R</label>
                            <input type="radio" name="ast_${docSnap.id}" id="f_${docSnap.id}" value="Falta"><label for="f_${docSnap.id}">❌ F</label>
                        </div>
                    </td>
                `;
                tabla.appendChild(row);
            });
            if(contador === 0) tabla.innerHTML = "<tr><td colspan='2' style='text-align:center;'>No hay alumnos en este grupo.</td></tr>";
        } catch (error) {}
    });

    document.getElementById('btn-guardar-asistencia').addEventListener('click', async () => {
        if(alumnosActuales.length === 0) return;
        let registroAsistencia = {};
        alumnosActuales.forEach(id => { registroAsistencia[id] = document.querySelector(`input[name="ast_${id}"]:checked`).value; });

        try {
            await addDoc(collection(db, "asistencias"), { grupo: filtroGrupo.value, materia: selectMateria.value, fecha: document.getElementById('fechaAsistencia').value, detalles: registroAsistencia, timestamp: new Date() });
            alert("🎉 ¡Guardado exitoso!"); seccionLista.style.display = 'none'; selectMateria.value = ""; 
        } catch (error) { alert("Error al guardar."); }
    });

    document.getElementById('btn-exportar-pdf').addEventListener('click', () => {
        html2pdf().set({ margin: 10, filename: 'Pase_De_Lista.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(document.getElementById('seccion-lista')).save();
    });
</script>
</body>
</html>
