<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pase de Lista - Amor y Libertad</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #f4f7fa; font-family: 'Segoe UI', sans-serif;}
        .container { max-width: 950px; margin: 30px auto; padding: 0 20px; }
        .card { padding: 30px; border-radius: 20px; background: #ffffff; border: 1px solid #eef2f7; box-shadow: 0 8px 16px rgba(0,0,0,0.03); margin-bottom: 25px; }
        .btn-back-clean { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 15px; color: #7f8fa4; text-decoration: none; font-weight: bold; }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; align-items: end; }
        .input-control { width: 100%; padding: 12px 15px; border: 2px solid #eef2f7; border-radius: 10px; font-size: 0.95rem; outline: none;}
        label { font-size: 0.85rem; font-weight: 700; color: #8898aa; display: block; margin-bottom: 8px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; border-bottom: 1px solid #f4f7fa; text-align:left; }
        .student-name { font-weight: 600; color: #32325d; font-size: 1.05rem; }
        
        .attendance-options { display: flex; gap: 10px; justify-content: flex-end; }
        .attendance-options label { cursor: pointer; padding: 8px 18px; border-radius: 20px; background: #f4f7fa; color: #7f8fa4; font-weight: 700; font-size: 0.85rem; border: 2px solid transparent; }
        .attendance-options input[type="radio"] { display: none; }
        .attendance-options input[value="Presente"]:checked + label { background: #e8f5e9; color: #2e7d32; border-color: #4CAF50; }
        .attendance-options input[value="Retardo"]:checked + label { background: #fff8e1; color: #f57f17; border-color: #FFC107; }
        .attendance-options input[value="Falta"]:checked + label { background: #ffebee; color: #c62828; border-color: #F44336; }
        .btn-guardar { background: linear-gradient(135deg, #4CAF50, #2E7D32); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s;}
        
        /* ESTILOS PARA EL PDF PROFESIONAL */
        #pdf-header { display: none; border-bottom: 2px solid #004a99; padding-bottom: 15px; margin-bottom: 20px; font-family: Arial, sans-serif; }
        .pdf-header-content { display: flex; align-items: center; justify-content: space-between; }
        .pdf-logo { width: 80px; height: auto; }
        .pdf-titles { text-align: center; flex: 1; }
        .pdf-titles h2 { margin: 0; color: #004a99; font-size: 22px; }
        .pdf-titles h3 { margin: 5px 0 0 0; color: #333; font-size: 16px; font-weight: normal; }
        #pdf-subtitle { text-align: center; margin-top: 15px; font-weight: bold; color: #555; background: #eef2f7; padding: 8px; border-radius: 5px;}
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header class="profile-header">
    <div class="cover-photo"><img src="Img/logo2.png" alt="Portada"></div>
    <div class="profile-info">
        <a href="dashboard-maestro.html" class="btn-back-clean">⬅ Volver al Panel</a>
        <div class="profile-text">
            <h1>Pase de Lista</h1>
            <p style="color: #8898aa;">Control y Consulta Histórica</p>
        </div>
    </div>
</header>

<main class="container">
    <section class="card">
        <div class="filters-grid">
            <div>
                <label>Grupo</label>
                <select id="filtroGrupo" class="input-control"><option value="">Cargando grupos...</option></select>
            </div>
            <div>
                <label>Mis Asignaturas</label>
                <select id="materiaAsistencia" class="input-control"><option value="">Esperando grupo...</option></select>
            </div>
            <div>
                <label>Fecha a Consultar / Pasar Lista</label>
                <input type="date" id="fechaAsistencia" class="input-control">
            </div>
            <div>
                <button id="btn-cargar-lista" class="btn btn-primary" style="width:100%; padding:12px; border-radius:10px; font-weight:bold;">Generar Lista</button>
            </div>
        </div>
    </section>

    <section class="card" id="seccion-lista" style="display: none;">
        
        <!-- MEMBRETE OCULTO PARA EL PDF -->
        <div id="pdf-header">
            <div class="pdf-header-content">
                <img src="Img/logo.png" class="pdf-logo">
                <div class="pdf-titles">
                    <h2>Centro Educativo Amor y Libertad</h2>
                    <h3>Reporte Oficial de Asistencia Diaria</h3>
                </div>
                <!-- Div vacío para centrar el texto correctamente -->
                <div style="width: 80px;"></div> 
            </div>
            <div id="pdf-subtitle"></div>
        </div>
        <!-- FIN MEMBRETE -->

        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eef2f7; padding-bottom: 15px; margin-bottom: 15px;" id="tabla-header-ui">
            <h3 style="margin: 0; color: #004a99; font-size: 1.4rem;" id="titulo-lista">Alumnos</h3>
            <span style="background: #e8f5e9; color: #2e7d32; padding: 5px 12px; border-radius: 20px; font-weight: bold;" id="badge-fecha"></span>
        </div>
        
        <table>
            <thead><tr><th>Nombre del Alumno</th><th style="text-align: right; padding-right: 25px;">Asistencia</th></tr></thead>
            <tbody id="tabla-asistencia"></tbody>
        </table>
        
        <div style="display: flex; gap: 15px; margin-top: 30px;" id="botones-accion">
            <button id="btn-guardar-asistencia" class="btn-guardar" style="flex: 2;">✅ Confirmar y Guardar</button>
            <button id="btn-exportar-pdf" class="btn" style="flex: 1; background: #004a99; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer;">📄 Exportar Formato PDF</button>
        </div>
    </section>
</main>

<script type="module">
    import { db, auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { collection, query, where, getDocs, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    document.getElementById('fechaAsistencia').valueAsDate = new Date();
    const filtroGrupo = document.getElementById('filtroGrupo');
    const selectMateria = document.getElementById('materiaAsistencia');
    const tabla = document.getElementById('tabla-asistencia');
    
    let maestroActual = null;
    let alumnosActuales = [];
    let idAsistenciaGuardada = null; 

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "login.html";
        else { maestroActual = user.email; cargarGruposOficiales(); }
    });

    async function cargarGruposOficiales() {
        try {
            const snap = await getDocs(collection(db, "grupos"));
            filtroGrupo.innerHTML = '<option value="">Seleccione grupo...</option>';
            snap.forEach((docSnap) => { filtroGrupo.innerHTML += `<option value="${docSnap.data().nombre}">${docSnap.data().nombre}</option>`; });
        } catch (error) { filtroGrupo.innerHTML = '<option value="">Error</option>'; }
    }

    filtroGrupo.addEventListener('change', async () => {
        const grupoSeleccionado = filtroGrupo.value;
        selectMateria.innerHTML = "<option value=''>Cargando tus materias...</option>";
        if (!grupoSeleccionado) { selectMateria.innerHTML = "<option value=''>Esperando grupo...</option>"; return; }
        try {
            // Filtro para traer solo materias de ESTE maestro
            const qMaterias = query(collection(db, "materias"), where("maestro_email", "==", maestroActual));
            const querySnapshot = await getDocs(qMaterias);
            selectMateria.innerHTML = "<option value=''>Seleccione asignatura...</option>";
            let contador = 0;
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                // Verificamos si la materia pertenece al grupo seleccionado
                if(data.grupo === grupoSeleccionado) {
                    contador++;
                    selectMateria.innerHTML += `<option value="${data.nombre}">${data.nombre}</option>`;
                }
            });
            if (contador === 0) selectMateria.innerHTML = "<option value=''>No tienes materias en este grupo</option>";
        } catch (error) {}
    });

    document.getElementById('btn-cargar-lista').addEventListener('click', async () => {
        const grupo = filtroGrupo.value; const materia = selectMateria.value; const fecha = document.getElementById('fechaAsistencia').value;
        if(!grupo || !materia) return alert("Selecciona un grupo y una asignatura.");
        
        document.getElementById('seccion-lista').style.display = 'block'; 
        alumnosActuales = []; idAsistenciaGuardada = null;
        document.getElementById('badge-fecha').innerText = fecha; document.getElementById('titulo-lista').innerText = `${grupo}`;

        try {
            let historialAsistencia = {};
            const qHistorial = query(collection(db, "asistencias"), where("grupo", "==", grupo), where("materia", "==", materia), where("fecha", "==", fecha));
            const historialSnap = await getDocs(qHistorial);
            if (!historialSnap.empty) {
                idAsistenciaGuardada = historialSnap.docs[0].id;
                historialAsistencia = historialSnap.docs[0].data().detalles;
                document.getElementById('btn-guardar-asistencia').innerText = "🔄 Actualizar Asistencia";
            } else {
                document.getElementById('btn-guardar-asistencia').innerText = "✅ Confirmar y Guardar";
            }

            const qAlumnos = query(collection(db, "alumnos"), where("grupo", "==", grupo));
            const alumnosSnap = await getDocs(qAlumnos);
            tabla.innerHTML = ""; let contador = 0;
            
            alumnosSnap.forEach((docSnap) => {
                contador++; const data = docSnap.data(); const idAlumno = docSnap.id;
                alumnosActuales.push(idAlumno); 
                let est = historialAsistencia[idAlumno] || "Presente";
                const isP = est === "Presente" ? "checked" : ""; const isR = est === "Retardo" ? "checked" : ""; const isF = est === "Falta" ? "checked" : "";

                tabla.innerHTML += `
                    <tr>
                        <td><div class="student-name">${data.nombre}</div></td>
                        <td>
                            <div class="attendance-options">
                                <input type="radio" name="ast_${idAlumno}" id="p_${idAlumno}" value="Presente" ${isP}><label for="p_${idAlumno}">✔️ P</label>
                                <input type="radio" name="ast_${idAlumno}" id="r_${idAlumno}" value="Retardo" ${isR}><label for="r_${idAlumno}">⏱️ R</label>
                                <input type="radio" name="ast_${idAlumno}" id="f_${idAlumno}" value="Falta" ${isF}><label for="f_${idAlumno}">❌ F</label>
                            </div>
                        </td>
                    </tr>
                `;
            });
            if(contador === 0) tabla.innerHTML = "<tr><td colspan='2'>No hay alumnos en este grupo.</td></tr>";
        } catch (error) { console.error(error); }
    });

    document.getElementById('btn-guardar-asistencia').addEventListener('click', async () => {
        if(alumnosActuales.length === 0) return;
        let registroAsistencia = {};
        alumnosActuales.forEach(id => { registroAsistencia[id] = document.querySelector(`input[name="ast_${id}"]:checked`).value; });

        try {
            if (idAsistenciaGuardada) {
                await updateDoc(doc(db, "asistencias", idAsistenciaGuardada), { detalles: registroAsistencia, timestamp: new Date() });
                alert("🔄 ¡Asistencia actualizada!");
            } else {
                await addDoc(collection(db, "asistencias"), { grupo: filtroGrupo.value, materia: selectMateria.value, fecha: document.getElementById('fechaAsistencia').value, detalles: registroAsistencia, timestamp: new Date() });
                alert("🎉 ¡Lista guardada!");
            }
            document.getElementById('seccion-lista').style.display = 'none'; 
        } catch (error) { alert("Error al guardar."); }
    });

    // MAGIA DEL PDF PROFESIONAL
    document.getElementById('btn-exportar-pdf').addEventListener('click', () => {
        const headerPDF = document.getElementById('pdf-header');
        const headerUI = document.getElementById('tabla-header-ui');
        const botones = document.getElementById('botones-accion');
        
        // Llenamos el subtítulo del PDF con la información actual
        document.getElementById('pdf-subtitle').innerText = `Grupo: ${filtroGrupo.value}  |  Asignatura: ${selectMateria.value}  |  Fecha: ${document.getElementById('fechaAsistencia').value}`;
        
        // Escondemos la interfaz web y mostramos el membrete
        headerPDF.style.display = 'block';
        headerUI.style.display = 'none';
        botones.style.display = 'none';
        
        // Generamos PDF tamaño carta
        html2pdf().set({ 
            margin: 15, 
            filename: `Asistencia_${filtroGrupo.value}.pdf`, 
            image: { type: 'jpeg', quality: 1 }, 
            html2canvas: { scale: 2 }, 
            jsPDF: { unit: 'mm', format: 'letter', orientation: 'portrait' } 
        }).from(document.getElementById('seccion-lista')).save().then(() => {
            // Regresamos todo a la normalidad
            headerPDF.style.display = 'none';
            headerUI.style.display = 'flex';
            botones.style.display = 'flex';
        });
    });
</script>
</body>
</html>
